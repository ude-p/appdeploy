name: ci

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.26.0"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/appdeploy

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Generate deepcopy code
        run: go run sigs.k8s.io/controller-tools/cmd/controller-gen@v0.21.0 object paths=./...

      - name: Generate manifests
        run: go run sigs.k8s.io/controller-tools/cmd/controller-gen@v0.21.0 rbac:roleName=manager-role crd paths=./... output:crd:artifacts:config=config/crd/bases

      - name: Compile Go packages
        run: go test ./... -run '^$'

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v3
        with:
          kustomize-version: 5.8.1

      - name: Generate install bundle
        working-directory: ${{ github.workspace }}/config/default
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"
          kustomize edit set image controller=${IMAGE_NAME}:${GITHUB_REF_NAME}
          kustomize build "$GITHUB_WORKSPACE/config/default" > "$GITHUB_WORKSPACE/dist/install.yaml"

      - name: Upload install bundle
        uses: actions/upload-artifact@v4
        with:
          name: install-yaml
          path: dist/install.yaml

  image:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      KO_DOCKER_REPO: ${{ env.IMAGE_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up ko
        uses: ko-build/setup-ko@v0.8

      - name: Build image
        run: ko build --bare --tags "${{ github.ref_name }}" --tags latest ./cmd

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download install bundle
        uses: actions/download-artifact@v4
        with:
          name: install-yaml
          path: dist

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/install.yaml
