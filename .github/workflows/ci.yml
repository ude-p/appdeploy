name: ci

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.26.0"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/appdeploy

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Generate deepcopy code
        run: go run sigs.k8s.io/controller-tools/cmd/controller-gen@v0.21.0 object paths=./...

      - name: Generate manifests
        run: go run sigs.k8s.io/controller-tools/cmd/controller-gen@v0.21.0 rbac:roleName=manager-role crd paths=./... output:crd:artifacts:config=config/crd/bases

      - name: Compile Go packages
        run: go test ./... -run '^$'

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.36.0

      - name: Generate install bundle
        run: |
          mkdir -p dist
          kubectl kustomize config/default > dist/install.yaml

      - name: Upload install bundle
        uses: actions/upload-artifact@v4
        with:
          name: install-yaml
          path: dist/install.yaml

  image:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download install bundle
        uses: actions/download-artifact@v4
        with:
          name: install-yaml
          path: dist

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/install.yaml
